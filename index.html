      // Use requestAnimationFrame to avoid blocking initial render
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function() {
          requestAnimationFrame(function() {
            document.body.classList.add('loaded');
          });
        });
      } else {
        requestAnimationFrame(function() {
          document.body.classList.add('loaded');
        });
      }
      
      // Optional: Wait for fonts if available (non-blocking)
      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(function() {
          // Fonts loaded, but content is already visible
        }).catch(function() {
          // Font loading failed, but content is already visible
        });
      }
    </script>
